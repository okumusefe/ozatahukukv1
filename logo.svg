  <!-- & symbol -->
  <text x="28" y="30" font-family="'Playfair Display', 'Times New Roman', serif" font-size="14" font-weight="400" fill="#8b7355" style="font-style: italic;">&</text>
  <!-- Ö Letter -->
  <text x="38" y="38" font-family="'Playfair Display', 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1a1f3d" style="font-style: italic;">Ö</text>
