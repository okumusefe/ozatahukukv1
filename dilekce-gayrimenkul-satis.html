<script>
// UDF formatında indir - SADECE saf metin, HTML yok
function downloadUDF(petitionId) {
    const petitionContent = document.getElementById(petitionId + '-content');
    if (!petitionContent) { alert('Dilekçe içeriği bulunamadı!'); return; }
    
    let cleanText = '';
    
    const title = petitionContent.querySelector('.petition-title');
    if (title) cleanText += title.innerText.toUpperCase() + '\n\n';
    
    petitionContent.querySelectorAll('.petition-section').forEach(section => {
        const label = section.querySelector('.petition-label')?.innerText || '';
        const content = section.querySelector('.petition-content')?.innerText || '';
        if (label) cleanText += label + ' ';
        if (content) cleanText += content + '\n\n';
    });
    
    petitionContent.querySelectorAll('.petition-content').forEach(content => {
        if (!content.closest('.petition-section')) {
            cleanText += content.innerText + '\n\n';
        }
    });
    
    const signature = petitionContent.querySelector('.petition-signature');
    if (signature) cleanText += '\n' + signature.innerText + '\n';
    
    if (cleanText.length > 51200) {
        alert('İçerik çok büyük, temizlenemiyor');
        return;
    }
    
    const htmlContent = '<html><body style="font-family: Times New Roman; font-size: 12pt;">' + 
                        cleanText.replace(/\n/g, '<br/>') + 
                        '</body></html>';
    
    const today = new Date();
    const dateTimeStr = today.toLocaleDateString('tr-TR') + ' ' + today.toLocaleTimeString('tr-TR');
    
    const udfContent = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<uyap:dokuman xmlns:uyap="http://www.uyap.gov.tr" Sürüm="4.0">
    <uyap:metaveri>
        <uyap:bilgi Ad="Döküman Türü" Değer="Dilekçe"/>
        <uyap:bilgi Ad="Hazırlanma Tarihi" Değer="${dateTimeStr}"/>
    </uyap:metaveri>
    <uyap:icerik>
        <![CDATA[${htmlContent}]]>
    </uyap:icerik>
</uyap:dokuman>`;
    
    console.log("UDF Boyut:", udfContent.length, "bytes");
    
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + udfContent], { type: 'application/xml' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = petitionId + '.udf'; document.body.appendChild(a); a.click(); document.body.removeChild(a); window.URL.revokeObjectURL(url);
}
</script>
